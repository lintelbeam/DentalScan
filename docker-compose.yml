services:
  postgres:
    image: postgres:16-alpine
    container_name: dentalscan-postgres
    environment:
      POSTGRES_USER: dentalscan
      POSTGRES_PASSWORD: dentalscan
      POSTGRES_DB: dentalscan
    ports:
      - "5432:5432"
    volumes:
      - dentalscan-postgres-data:/var/lib/postgresql/data

  dentalscan:
    container_name: dentalscan-app
    build:
      context: ./starter-kit
      dockerfile: Dockerfile
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://dentalscan:dentalscan@postgres:5432/dentalscan?schema=public}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
    command: sh -c "npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  dentalscan-postgres-data:
