services:
  dentalscan:
    container_name: dentalscan-app
    build:
      context: ./starter-kit
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
    command: sh -c "npx prisma db push && npm run dev -- --hostname 0.0.0.0 --port 3000"
